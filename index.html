<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cryptography Playground</title>

    <!-- ✅ Correct CSS link -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Cryptography Playground</h1>
        <p>Learn & test different cryptographic techniques in your browser.</p>
    </header>

    <!-- ============================
         CAESAR CIPHER SECTION
         ============================ -->
    <section class="card">
        <h2>Caesar Cipher (Classical Cryptography)</h2>

        <textarea id="caesar-input" placeholder="Enter text..."></textarea>

        <label>Shift:</label>
        <input type="number" id="shift" value="3">

        <button onclick="caesarEncrypt()">Encrypt</button>
        <button onclick="caesarDecrypt()">Decrypt</button>

        <pre id="caesar-output"></pre>
    </section>


    <!-- ============================
         SHA‑256 HASHING SECTION
         ============================ -->
    <section class="card">
        <h2>SHA‑256 Hash (One‑Way Hashing)</h2>

        <input type="text" id="hash-input" placeholder="Enter text...">
        <button onclick="generateHash()">Generate Hash</button>

        <pre id="hash-output"></pre>
    </section>


    <!-- ============================
         AES‑256 ENCRYPTION
         ============================ -->
    <section class="card">
        <h2>AES‑256 Encryption (Modern Symmetric Crypto)</h2>
